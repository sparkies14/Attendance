<!DOCTYPE html>
<html lang="en">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ede8;
    --card: #faf9f7;
    --border: #d8d4cc;
    --accent: #1a472a;
    --accent-light: #e8f0eb;
    --danger: #8b2020;
    --danger-light: #f5eaea;
    --text: #1c1a18;
    --muted: #7a756e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.03) 39px, rgba(0,0,0,0.03) 40px);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text);
  }

  .wrapper {
    width: 100%;
    max-width: 400px;
    animation: appear 0.5s ease both;
  }
  @keyframes appear {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .top-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .brand {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .jst-pill {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-light);
    border: 1px solid rgba(26,71,42,0.18);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }

  .clock-block {
    background: var(--accent);
    border-radius: 12px;
    padding: 28px 28px 22px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .clock-block::before {
    content: '';
    position: absolute;
    right: -20px; top: -30px;
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 28px solid rgba(255,255,255,0.05);
    pointer-events: none;
  }
  .clock-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: #fff;
    line-height: 1;
    letter-spacing: 2px;
  }
  .clock-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .clock-date {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .clock-jst {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.06em;
    background: rgba(255,255,255,0.1);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
  }

  .field { margin-bottom: 16px; }
  .field-label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 7px;
  }
  .field input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input[type="text"]::placeholder { color: #b0ab9f; }
  .field input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,71,42,0.1);
  }
  .field input[type="text"].filled {
    background: var(--card);
    border-color: rgba(26,71,42,0.3);
  }

  .toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .tog {
    flex: 1;
    padding: 9px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tog.active {
    background: var(--accent-light);
    border-color: rgba(26,71,42,0.3);
    color: var(--accent);
    font-weight: 500;
  }
  .tog-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.7;
  }

  hr.div {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn {
    padding: 16px 10px;
    border: none;
    border-radius: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-icon { font-size: 20px; line-height: 1; }
  .btn-in { background: var(--accent); color: #fff; }
  .btn-in:not(:disabled):hover { background: #15391f; }
  .btn-out {
    background: transparent;
    color: var(--danger);
    border: 1px solid rgba(139,32,32,0.25);
  }
  .btn-out:not(:disabled):hover { background: var(--danger-light); }

  .status {
    display: none;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
    margin-top: 14px;
    animation: appear 0.25s ease both;
  }
  .status.show { display: flex; }
  .status.success { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(26,71,42,0.2); }
  .status.error   { background: var(--danger-light); color: var(--danger);  border: 1px solid rgba(139,32,32,0.2); }
  .status.loading { background: #f5f3f0; color: var(--muted); border: 1px solid var(--border); }
  .s-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin {
    display: inline-block;
    width: 13px; height: 13px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="top-label">
    <span class="brand">Team Attendance</span>
    <span class="jst-pill" id="jst-pill">JST --:--</span>
  </div>

  <div class="clock-block">
    <div class="clock-time" id="local-time">--:--:--</div>
    <div class="clock-meta">
      <span class="clock-date" id="local-date">Loading...</span>
      <span class="clock-jst" id="jst-display">UTC+9 --:--</span>
    </div>
  </div>

  <div class="card">

    <div class="field">
  <label class="field-label">Account</label>
  <div id="google-btn"></div>
  <div id="user-info" style="display:none; margin-top:10px;">
    <div style="display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--accent-light); border:1px solid rgba(26,71,42,0.2); border-radius:8px;">
      <img id="user-avatar" src="" style="width:32px; height:32px; border-radius:50%;" />
      <div>
        <div style="font-size:13px; font-weight:500;" id="user-name"></div>
        <div style="font-size:11px; color:var(--muted);" id="user-email"></div>
      </div>
      <button onclick="signOut()" style="margin-left:auto; font-size:10px; background:none; border:1px solid var(--border); border-radius:6px; padding:4px 8px; cursor:pointer; font-family:'IBM Plex Mono',monospace; color:var(--muted);">Sign out</button>
    </div>
  </div>
</div>

    <div class="field" style="margin-bottom:8px;">
      <label class="field-label">Entry type</label>
    </div>
    <div class="toggle-row">
      <button class="tog active" id="tog-auto"   onclick="setType('auto')">  <span class="tog-dot"></span> Auto   </button>
      <button class="tog"        id="tog-manual" onclick="setType('manual')"><span class="tog-dot"></span> Manual </button>
    </div>

    <hr class="div">

    <div class="btn-row">
      <button class="btn btn-in"  id="btn-in"  onclick="send('clock-in')">
        <span class="btn-icon">→</span>Clock In
      </button>
      <button class="btn btn-out" id="btn-out" onclick="send('clock-out')">
        <span class="btn-icon">←</span>Clock Out
      </button>
    </div>

    <div class="status" id="status-box">
      <span id="s-icon"></span>
      <span id="s-msg"></span>
    </div>

  </div>

  <div class="footer">Work hours&nbsp;&nbsp;9:00 AM – 6:00 PM&nbsp;&nbsp;JST (UTC+9)</div>

</div>
<script>
 const WEBHOOK = "https://e-formentera.app.n8n.cloud/webhook/attendance";

let entryType = 'auto';
let googleUser = null;

/* ── Google Sign In ── */
window.onload = function() {
  google.accounts.id.initialize({
    client_id: '235069172609-3fjjse85jeuj815o3rrtrtd8i21s12f3.apps.googleusercontent.com',
    callback: handleCredentialResponse,
    auto_select: false
  });
  google.accounts.id.renderButton(
    document.getElementById('google-btn'),
    { 
      theme: 'outline', 
      size: 'large',
      width: 356,
      text: 'signin_with'
    }
  );
}

function parseJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(atob(base64));
}

function handleCredentialResponse(response) {
  const payload = parseJwt(response.credential);
  googleUser = {
    name: payload.name,
    email: payload.email,
    avatar: payload.picture
  };
  document.getElementById('google-btn').style.display = 'none';
  document.getElementById('user-info').style.display = 'block';
  document.getElementById('user-name').textContent = payload.name;
  document.getElementById('user-email').textContent = payload.email;
  document.getElementById('user-avatar').src = payload.picture;
}

function signOut() {
  googleUser = null;
  document.getElementById('google-btn').style.display = 'block';
  document.getElementById('user-info').style.display = 'none';
  google.accounts.id.disableAutoSelect();
}

/* ── Fingerprint ── */
function getFingerprint() {
  const raw = [
    navigator.userAgent,
    navigator.language,
    screen.width + 'x' + screen.height,
    screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency || 'n/a',
    navigator.platform || 'n/a'
  ].join('|');
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    hash = (Math.imul(31, hash) + raw.charCodeAt(i)) | 0;
  }
  return 'fp_' + Math.abs(hash).toString(16);
}

/* ── Entry type toggle ── */
function setType(t) {
  entryType = t;
  document.getElementById('tog-auto').classList.toggle('active', t === 'auto');
  document.getElementById('tog-manual').classList.toggle('active', t === 'manual');
}

/* ── Live clock ── */
function tick() {
  const now = new Date();
  const jst = new Date(now.getTime() + 9 * 3600000);
  const p   = n => String(n).padStart(2, '0');
  document.getElementById('local-time').textContent =
    `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('local-date').textContent =
    `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  const jh = p(jst.getUTCHours()), jm = p(jst.getUTCMinutes());
  document.getElementById('jst-display').textContent = `UTC+9  ${jh}:${jm}`;
  document.getElementById('jst-pill').textContent    = `JST ${jh}:${jm}`;
}
setInterval(tick, 1000); tick();

/* ── Status helper ── */
function showStatus(type, msg) {
  const box = document.getElementById('status-box');
  const ico = document.getElementById('s-icon');
  box.className = `status show ${type}`;
  document.getElementById('s-msg').textContent = msg;
  ico.innerHTML = type === 'loading' ? '<span class="spin"></span>'
                : type === 'success' ? '✓' : '✕';
}
function setBtns(off) {
  document.getElementById('btn-in').disabled  = off;
  document.getElementById('btn-out').disabled = off;
}

/* ── Submit ── */
async function send(action) {
  if (!googleUser) {
    showStatus('error', 'Please sign in with Google first.');
    return;
  }

  setBtns(true);
  const label = action === 'clock-in' ? 'clock-in' : 'clock-out';
  showStatus('loading', `Sending ${label} for ${googleUser.name}...`);

  const now = new Date();
  const jst = new Date(now.getTime() + 9 * 3600000);
  const p   = n => String(n).padStart(2, '0');
  const fp  = getFingerprint();

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:       googleUser.name,
        email:      googleUser.email,
        action,
        entry_type:  entryType,
        local_time:  now.toLocaleTimeString(),
        date:        now.toLocaleDateString(),
        timezone:    Intl.DateTimeFormat().resolvedOptions().timeZone,
        jst_time:    jst.toUTCString(),
        jst_hour:    jst.getUTCHours(),
        jst_minute:  jst.getUTCMinutes(),
        fingerprint: fp
      })
    });

    if (res.ok) {
      const data = await res.json();
      if (data && data.error) {
        showStatus('error', data.error);
      } else {
        const verb = action === 'clock-in' ? 'Clocked in' : 'Clocked out';
        showStatus('success',
          `${verb} at ${p(jst.getUTCHours())}:${p(jst.getUTCMinutes())} JST — logged to sheet & Discord.`);
      }
    } else {
      showStatus('error', `Server error ${res.status}. Make sure the n8n workflow is active.`);
    }
  } catch (e) {
    showStatus('error', 'Connection failed. Try again.');
  } finally {
    setBtns(false);
  }
}
</script>
</body>
</html>
